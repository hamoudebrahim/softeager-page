<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softeager | Full Stack Developer</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
        }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .profile-card {
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 600px;
            text-align: center;
            width: 90%;
            margin-top: 2rem;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            object-fit: cover;
            margin: 0 auto 1.5rem;
            display: block;
        }
        h1 {
            margin: 0 0 0.5rem;
            font-size: 2rem;
        }
        p.bio {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }
        .tech-badge {
            background: #e5e7eb;
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s ease;
        }
        .tech-badge:hover {
            transform: translateY(-2px);
            background: #d1d5db;
        }
        .tech-badge i {
            font-size: 1.2rem;
        }
        footer {
            margin-top: 2rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        a {
            color: var(--primary);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://avatars.githubusercontent.com/u/213730608?v=4" alt="Softeager Profile" class="avatar">
        
        <h1>Full Stack Developer</h1>
        <p class="bio">Welcome to Softeager. I love developing apps that help everyone. With expertise across the full stack, I build practical, high-quality solutions from the server to the screen.</p>
        
        <div class="tech-stack">
            <span class="tech-badge"><i class="devicon-laravel-original colored"></i> Laravel</span>
            <span class="tech-badge"><i class="devicon-django-plain colored"></i> Django</span>
            <span class="tech-badge"><i class="devicon-fastapi-plain colored"></i> FastAPI</span>
            <span class="tech-badge"><i class="devicon-nextjs-plain"></i> Next.js</span>
            <span class="tech-badge"><i class="devicon-flutter-plain colored"></i> Flutter</span>
            <span class="tech-badge"><i class="devicon-mysql-original colored"></i> MySQL</span>
            <span class="tech-badge"><i class="devicon-postgresql-plain colored"></i> PostgreSQL</span>
            <span class="tech-badge"><i class="devicon-nginx-original colored"></i> Nginx</span>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Softeager.net | <a href="/privacy-policy.html">Privacy Policy</a></p>
    </footer>

</body>
</html>
